<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מושפיט x דיגיטף 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;900&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @page { size: A4 portrait; margin: 0; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px;
      font-family: 'Heebo', sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 14mm 14mm 10mm;
    }

    /* ===== TOP BRAND ===== */
    .brand {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #0891B2;
      letter-spacing: 0.06em;
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px solid #E5E7EB;
      width: 100%;
    }

    /* ===== MAIN AREA ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      padding: 8mm 0;
    }

    /* ===== MASCOT SIDE ===== */
    .mascot-side {
      flex: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mascot-img {
      width: 210px;
      height: 210px;
      object-fit: contain;
      display: block;
      mix-blend-mode: multiply;
    }

    /* שלט שהמושפיטר "מחזיק" */
    .sign {
      background: #1F2937;
      color: #fff;
      border-radius: 16px;
      padding: 14px 20px;
      text-align: center;
      position: relative;
      margin-top: -10px;
      max-width: 200px;
    }
    /* עמוד השלט */
    .sign::before {
      content: '';
      position: absolute;
      top: -12px; left: 50%; transform: translateX(-50%);
      width: 6px; height: 14px;
      background: #6B7280;
      border-radius: 3px;
    }
    .sign-title {
      font-family: 'Rubik', sans-serif;
      font-weight: 900;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .sign-sub {
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      color: #9CA3AF;
      line-height: 1.4;
    }

    /* ===== ARROW ===== */
    .arrow-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
    }
    .arrow-svg {
      width: 60px;
      height: 60px;
      fill: none;
      stroke: #06B6D4;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== QR SIDE ===== */
    .qr-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .qr-img {
      width: 200px;
      height: 200px;
      display: block;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .qr-label {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #1F2937;
      text-align: center;
    }

    /* ===== FOOTER ===== */
    .footer {
      font-family: 'Heebo', sans-serif;
      font-size: 11px;
      color: #9CA3AF;
      text-align: center;
      line-height: 1.7;
      border-top: 1.5px solid #E5E7EB;
      padding-top: 8px;
      width: 100%;
    }

    /* ===== PRINT ===== */
    @media print {
      body { background: white; padding: 0; }
      .page { margin: 0; }
      .print-btn { display: none; }
    }

    .print-btn {
      margin-top: 20px;
      background: #F97316;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 12px 32px;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
