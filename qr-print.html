    body {

      padding: 24px;

    .page {

      bottom: -60px; left: -60px;
      width: 280px; height: 280px;

    .brand-tag {

      color: white;

      font-weight: 700;
      font-size: 14px;

      margin-bottom: 20px;
      position: relative; z-index: 1;

      height: 190px;
      object-fit: contain;
      margin-bottom: 14px;
      mix-blend-mode: multiply;
      position: relative; z-index: 1;

      font-weight: 900;
      font-size: 36px;
      line-height: 1.2;
      text-align: center;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      position: relative; z-index: 1;
    }

    .subhead {
      font-family: 'Heebo', sans-serif;
      font-size: 17px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.55;
      position: relative; z-index: 1;
    }

    .qr-wrap {
      background: white;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      border: 1.5px solid #E5E7EB;
      position: relative; z-index: 1;
    }

    .qr-wrap img {
      display: block;
      width: 200px;
      height: 200px;
    }

    .scan-label {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: 21px;
      color: #1F2937;
      text-align: center;
      margin-bottom: 8px;
      position: relative; z-index: 1;

    .scan-sub {
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      color: #374151;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.5;
      max-width: 340px;
      position: relative; z-index: 1;
    }

    .url-box {
      background: #ECFEFF;
      border: 1.5px solid #06B6D4;
      border-radius: 12px;
      padding: 9px 18px;
      font-family: 'Heebo', sans-serif;

      color: #0891B2;
      direction: ltr;
      margin-bottom: 24px;
      text-align: center;
      position: relative; z-index: 1;

      font-weight: 700;
      font-size: 17px;
