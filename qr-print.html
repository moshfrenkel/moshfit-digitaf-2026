  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20mm 20mm;
    }

    .mascot {
      width: 180px;
      height: 180px;
      object-fit: contain;
      display: block;
      margin-bottom: 18px;
    }

    .title {
      font-family: 'Rubik', sans-serif;
      font-weight: 900;
      font-size: 34px;
      color: #06B6D4;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .subtitle {
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .qr-img {
      width: 220px;
      height: 220px;
      display: block;
      margin-bottom: 20px;
    }

    .scan-text {
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #1F2937;
      text-align: center;
      margin-bottom: 6px;
    }

    .scan-sub {
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      color: #6B7280;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #06B6D4;
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .footer {
      font-family: 'Heebo', sans-serif;
      font-size: 12px;
      color: #9CA3AF;
      text-align: center;
      line-height: 1.6;
    }

    @media print {
      body { background: white; padding: 0; }
      .page { margin: 0; border: none; }
      .print-btn { display: none; }
    }

    .print-btn {
      margin-top: 20px;
      background: #F97316;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 12px 32px;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
